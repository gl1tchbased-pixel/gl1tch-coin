name: Security

# Phase -1 (PREMIUM-PLAN-v3): secret-leak scan, dependency audit, and the core invariant
# check — no component may ever request a fund-transfer / approval signature.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  secrets:
    name: Secret leak scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Fail on any NEW high/critical advisory in production deps. Two transitive
      # advisories from @solana/web3.js@1.x (no clean fix) are allow-listed and tracked
      # in docs/risk-register.md — they clear on the web3.js v2 migration.
      # The two root advisories (bigint-buffer, elliptic) cascade through the whole
      # @solana/web3.js@1.x tree, so npm audit reports each affected package. Allow-list
      # the full known chain (tracked in docs/risk-register.md); any NEW advisory in any
      # OTHER package still fails the build.
      - name: audit-ci (prod deps, high+)
        run: >
          npx --yes audit-ci@^7 --high --skip-dev
          --allowlist
          GHSA-3gc7-fjrx-p6mg GHSA-848j-6mx2-7j84
          bigint-buffer elliptic
          @solana/web3.js @solana/buffer-layout-utils
          @solana/spl-token @solana/spl-token-group @solana/spl-token-metadata

  invariant:
    name: No fund/approval signature calls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Core invariant: GL1TCH only ever requests ownership-proving message signatures.
      # These calls move funds or grant allowances and must never appear in the app.
      - name: Grep for forbidden web3 calls
        run: |
          set -e
          PATTERN='eth_sendTransaction|sendTransaction\(|setApprovalForAll|increaseAllowance|\.approve\(|signAndSendTransaction'
          if grep -rEn --include=*.ts --include=*.tsx "$PATTERN" src bot/src 2>/dev/null; then
            echo "::error::Forbidden fund-transfer/approval call found — GL1TCH must only request ownership signatures (see docs/threat-model.md)."
            exit 1
          fi
          echo "OK — no fund-transfer/approval calls."
