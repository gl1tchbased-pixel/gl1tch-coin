name: CI

# Lean, reliable type-check gate. The real production build/deploy runs on Vercel
# (site) and the Deploy-bot workflow (Railway), so CI just keeps types honest.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install (site)
        run: npm install --no-audit --no-fund
      - name: Type-check site
        run: npx tsc --noEmit
      - name: Type-check bot
        run: cd bot && npm install --no-audit --no-fund && npx tsc --noEmit
